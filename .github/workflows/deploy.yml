name: Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push wms-api
        run: |
          docker build -t $ECR_REGISTRY/sumosave/wms-api:${{ github.sha }} -f apps/wms-api/Dockerfile .
          docker push $ECR_REGISTRY/sumosave/wms-api:${{ github.sha }}

      - name: Build and push vendor-portal
        run: |
          docker build -t $ECR_REGISTRY/sumosave/vendor-portal:${{ github.sha }} -f apps/vendor-portal/Dockerfile .
          docker push $ECR_REGISTRY/sumosave/vendor-portal:${{ github.sha }}

  sync-argocd:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Sync ArgoCD wms-api app
        run: |
          argocd app sync wms-api \
            --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --insecure
