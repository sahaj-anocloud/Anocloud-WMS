apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wms-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sumosave/sumosave-wms
    targetRevision: main
    path: infra/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: wms
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
