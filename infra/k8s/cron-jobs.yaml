# SAP Sync CronJob — runs every 15 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sap-sync
  namespace: sumosave-wms
  labels:
    app: sap-sync
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: sap-sync
        spec:
          restartPolicy: OnFailure
          serviceAccountName: wms-worker
          containers:
            - name: sap-sync
              image: placeholder-ecr-account.dkr.ecr.ap-south-1.amazonaws.com/sumosave/wms-api:latest
              command: ["node", "dist/jobs/sap-sync.js"]
              env:
                - name: NODE_ENV
                  value: "production"
                - name: SAP_SERVICE_URL
                  valueFrom:
                    secretKeyRef:
                      name: wms-api-secrets
                      key: sap-service-url
                - name: DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: wms-api-secrets
                      key: db-host
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
---
