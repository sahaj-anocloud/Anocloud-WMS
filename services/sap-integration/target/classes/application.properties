server.port=8081
spring.application.name=sap-integration

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sumosave_wms}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# AWS SQS Configuration
aws.sqs.alert-queue-url=${ALERT_QUEUE_URL:https://sqs.ap-south-1.amazonaws.com/123456789012/wms-alerts}
aws.region=${AWS_REGION:ap-south-1}
